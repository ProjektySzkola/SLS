<!-- admin_panel/login.html -->
<!DOCTYPE html><html lang="pl"><head>
  <meta charset="UTF-8">
  <title>Logowanie — Panel Admina</title>
  <script type="module" src="./supabase-client.js"></script>
</head><body>
  <h2>Logowanie</h2>
  <input id="email" type="email" placeholder="Twój e-mail">
  <button id="btn">Wyślij link logowania</button>
  <p id="msg"></p>
  <script type="module">
    import { supabase } from './supabase-client.js';
    document.getElementById('btn').addEventListener('click', async () => {
      const email = document.getElementById('email').value;
      const { error } = await supabase.auth.signInWithOtp({
        email,
        options: {
          emailRedirectTo: 'https://TWOJA-ORG.github.io/NAZWA-REPO/admin_panel/admin.html'
        }
      });
      document.getElementById('msg').textContent =
        error ? 'Błąd: ' + error.message : 'Sprawdź skrzynkę — wysłaliśmy link!';
    });
  </script>
</body></html>
